<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦐 小蝦 57 技能儀表板</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --cyan: #39d2c0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Noto Sans TC', monospace;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
  }
  .header h1 { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .header .info { text-align: right; font-size: 13px; color: var(--text-dim); }
  .header .info .date { font-size:15px; color:var(--text); }
  .nav-link {
    display: inline-block; padding: 6px 14px; margin-top: 6px;
    background: rgba(88,166,255,.12); color: var(--accent);
    border: 1px solid rgba(88,166,255,.25); border-radius: 8px;
    text-decoration: none; font-size: 14px; font-weight: 500;
    transition: .15s;
  }
  .nav-link:hover { background: rgba(88,166,255,.2); }

  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 110px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .stat-card.fin .num { color: var(--green); }
  .stat-card.done .num { color: var(--purple); }
  .stat-card.ing .num { color: var(--orange); }
  .stat-card.new .num { color: var(--text-dim); }

  .filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 16px; border: 1px solid var(--border); border-radius: 18px;
    background: transparent; color: var(--text-dim); font-size: 13px;
    cursor: pointer; transition: .15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .tbl-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; background: var(--surface); font-size: 14px; }
  thead { background: var(--surface2); position: sticky; top: 0; }
  th {
    padding: 10px 12px; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .4px;
    color: var(--text-dim); text-align: left;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(88,166,255,.04); }
  tr.fin td:first-child { border-left: 4px solid var(--green); }
  tr.done td:first-child { border-left: 4px solid var(--purple); }
  tr.ing td:first-child { border-left: 4px solid var(--orange); }

  .sn { font-weight: 600; color: var(--text-dim); font-size: 12px; width: 30px; }
  .sname { font-weight: 600; }
  .desc { color: var(--text-dim); font-size: 13px; max-width: 240px; line-height: 1.4; }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 12px; font-weight: 500; white-space: nowrap;
  }
  .tag-fin    { background: rgba(63,185,80,.15); color: var(--green); }
  .tag-done   { background: rgba(188,140,255,.15); color: var(--purple); }
  .tag-ing    { background: rgba(210,153,34,.15); color: var(--orange); }
  .plan-rng {
    display: inline-block; background: rgba(88,166,255,.1);
    padding: 3px 8px; border-radius: 4px; font-size: 12px; color: var(--accent);
  }
  .actual { font-size: 12px; color: var(--text-dim); }
  .result { font-size: 12px; line-height: 1.5; }
  .result .item {
    display: inline-block; background: var(--surface2);
    padding: 2px 7px; border-radius: 3px; margin: 2px 2px;
    font-size: 11px; border: 1px solid var(--border);
  }
  .pd {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 5px;
  }
  .pd-fin { background: var(--green); }
  .pd-done { background: var(--purple); }
  .pd-ing { background: var(--orange); }
  .pd-new { background: var(--text-dim); }

  .legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--text-dim); flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 5px; }
</style>
</head>
<body>

  <h1>🦐 小蝦 57 技能儀表板</h1>
  <div class="info">
    <div class="date" id="currentDate"></div>

  <div class="stat-card ing"><div class="num" id="cIng">0</div><div class="label">📚 學習中</div></div>
  <div class="stat-card new"><div class="num" id="cNew">0</div><div class="label">🆕 新技能</div></div>

<div class="legend">
  <span><span class="pd pd-fin"></span>Finish — 已上線實戰</span>
  <span><span class="pd pd-done"></span>已學習 — 學過用過</span>
  <span><span class="pd pd-ing"></span>學習中 — 正在學</span>
  <span><span class="pd pd-new"></span>新技能 — 還沒碰</span>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">全部 (57)</button>
  <button class="filter-btn" data-filter="fin">🏁 Finish</button>
  <button class="filter-btn" data-filter="done">📗 已學習</button>
  <button class="filter-btn" data-filter="ing">📚 學習中</button>
  <button class="filter-btn" data-filter="new">🆕 新技能</button>

<div class="tbl-wrap">

</div>

const sl = {
  fin:  {lab:'🏁 Finish',   cls:'tag-fin',  pd:'pd-fin'},

  ing:  {lab:'📚 學習中', cls:'tag-ing',  pd:'pd-ing'},
  new:  {lab:'🆕 新技能', cls:'',         pd:'pd-new'}
};

function render(f) {
  const flt = f==='all' ? skills : skills.filter(x=>x.st===f);
  const tb = document.getElementById('skillBody');
  tb.innerHTML = flt.map(x => `
    <tr class="${x.st}">
      <td class="sn">${x.n}</td>
      <td><span class="sname">${x.em} ${x.s}</span></td>
      <td><div class="desc">${x.desc}</div></td>
      <td><span class="tag ${sl[x.st].cls}"><span class="pd ${sl[x.st].pd}"></span>${sl[x.st].lab}</span></td>
      <td>${x.plan ? `<span class="plan-rng">${x.plan}</span>` : '—'}</td>
      <td class="actual">${x.act}</td>
      <td class="result">${x.res.filter(r=>r).map(r=>`<span class="item">${r}</span>`).join(' ')}</td>
    </tr>
  `).join('');
  document.getElementById('cFin').textContent = skills.filter(x=>x.st==='fin').length;
  document.getElementById('cDone').textContent = skills.filter(x=>x.st==='done').length;
  document.getElementById('cIng').textContent = skills.filter(x=>x.st==='ing').length;
  document.getElementById('cNew').textContent = skills.filter(x=>x.st==='new').length;
}

document.querySelectorAll('.filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render(b.dataset.filter);
  });
});

const now = new Date();
document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long',timeZone:'Asia/Taipei'});
const weekNum = (y,m,d)=>{
  const t=new Date(y,m,d); t.setDate(t.getDate()+3-(t.getDay()+6)%7);
  const y1=t.getFullYear(); const d1=new Date(y1,0,4);
  return 1+Math.round(((t-d1)/864e5-3+(d1.getDay()+6)%7)/7);
};
document.getElementById('currentWeek').textContent = weekNum(now.getFullYear(),now.getMonth(),now.getDate());
document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Taipei'});
render('all');

</body>
</html>
